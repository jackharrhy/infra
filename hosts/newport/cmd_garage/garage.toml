# Single-node Garage for cmd object store (prod, newport). Internal-only
# (cmd_db network); cmd reaches it at garage:3900 over path-style + SigV4.
# Secrets (rpc_secret, admin_token) come from the environment via
# GARAGE_RPC_SECRET / GARAGE_ADMIN_TOKEN (cmd_garage.enc.yaml), NOT this file.
metadata_dir = "/var/lib/garage/meta"
data_dir = "/var/lib/garage/data"
db_engine = "sqlite"

replication_factor = 1

rpc_bind_addr = "[::]:3901"
rpc_public_addr = "127.0.0.1:3901"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"
root_domain = ".s3.garage.local"

[admin]
api_bind_addr = "[::]:3903"
