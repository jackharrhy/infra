services:
  beancraft:
    image: itzg/minecraft-server:java21
    restart: unless-stopped
    tty: true
    stdin_open: true
    ports:
      - "25565:25565"
      - "127.0.0.1:25575:25575"
    env_file:
      - ./.runtime-secrets/beancraft.env
    environment:
      EULA: "true"
      TYPE: "AUTO_CURSEFORGE"
      CF_PAGE_URL: "https://www.curseforge.com/minecraft/modpacks/all-of-create-aeronautics"
      MEMORY: "12G"
      USE_AIKAR_FLAGS: "true"
      MOTD: "beancraft"
      OPS: cheesemany
      WHITELIST: cheesemany
      CURSEFORGE_FILES: "bluemap"
      ENABLE_RCON: "true"
    volumes:
      - ./data:/data
    networks:
      - web
      - backup
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.beancraft.loadbalancer.server.port=8100"
      - "traefik.http.routers.beancraft.rule=Host(`craft.jackharrhy.dev`)"
      # DNS A record points at newport (doubles as MC server hostname on
      # :25565), so TLS terminates here rather than via mug.
      - "traefik.http.routers.beancraft.entrypoints=websecure"
      - "traefik.http.routers.beancraft.tls.certresolver=newporthttp"

  beancraft-backup:
    image: itzg/mc-backup
    restart: unless-stopped
    depends_on:
      - beancraft
    env_file:
      - ./.runtime-secrets/beancraft.env
    environment:
      RCON_HOST: beancraft
      RCON_PORT: "25575"
      # Daily backup at 04:00 server-local time
      CRON_SCHEDULE: "0 4 * * *"
      PRUNE_BACKUPS_DAYS: "14"
      EXCLUDES: "*.jar,cache,logs,*.tmp,mods,libraries,.cache,.mixin.out,crash-reports"
      TZ: "America/St_Johns"
    volumes:
      - ./data:/data:ro
      - ./backups:/backups
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
    networks:
      - backup

networks:
  web:
    external: true
    name: newport_web
  backup:
    driver: bridge
