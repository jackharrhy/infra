services:
  traefik:
    image: traefik:v3
    restart: unless-stopped
    network_mode: host
    command:
      - "--log.level=INFO"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      # Trust X-Forwarded-* from mug's tailnet IP only (not the full
      # tailnet CGNAT range, which would trust other peers) plus the
      # docker bridge gateway range. Per-entrypoint, so websecure stays
      # untrusted (public-facing).
      - "--entrypoints.web.forwardedheaders.trustedips=100.124.6.111/32,172.16.0.0/12"
      - "--entrypoints.websecure.address=:443"
      # Entrypoint-level http→https redirect at low priority so existing
      # `web`-only services (mug-proxied) keep working; public :80 hits
      # fall through to this redirect.
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"
      - "--entrypoints.web.http.redirections.entrypoint.priority=10"
      # HTTP-01 rather than DNS-01 so the DO API token stays on mug.
      - "--certificatesresolvers.newporthttp.acme.email=me@jackharrhy.com"
      - "--certificatesresolvers.newporthttp.acme.httpchallenge=true"
      - "--certificatesresolvers.newporthttp.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.newporthttp.acme.storage=/letsencrypt/acme-http.json"
      # DNS-01 via Cloudflare for wildcard certs (*.workspace.cmd.softspark.dev
      # can't be issued over HTTP-01). Token lives in .runtime-secrets/traefik.env
      # (CF_DNS_API_TOKEN, scoped Zone:DNS:Edit on softspark.dev only).
      - "--certificatesresolvers.cfdns.acme.email=me@jackharrhy.com"
      - "--certificatesresolvers.cfdns.acme.dnschallenge.provider=cloudflare"
      - "--certificatesresolvers.cfdns.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53"
      - "--certificatesresolvers.cfdns.acme.storage=/letsencrypt/acme-dns.json"
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--entrypoints.traefik.address=127.0.0.1:18081"
    env_file:
      - ./.runtime-secrets/traefik.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./volumes/traefik_letsencrypt_data:/letsencrypt

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:1.17
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./.runtime-secrets/watchtower.env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  beszel-agent:
    image: ghcr.io/henrygd/beszel/beszel-agent:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./volumes/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ./.runtime-secrets/beszel-agent.env

  4orm:
    image: ghcr.io/jackharrhy/4orm:main
    restart: unless-stopped
    networks: [web]
    env_file:
      - ./.runtime-secrets/4orm.env
    environment:
      - SITE_URL=https://4orm.harrhy.xyz
    volumes:
      - /mnt/terrabud/docker-data/newport/4orm_data:/app/data
      - /mnt/terrabud/docker-data/newport/4orm_uploads:/app/uploads
      - /mnt/terrabud/docker-data/newport/4orm_backups:/app/backups
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.4orm.loadbalancer.server.port=8000"
      - "traefik.http.routers.4orm.rule=Host(`4orm.harrhy.xyz`)"
      - "traefik.http.routers.4orm.entrypoints=web"

  hikeping:
    image: ghcr.io/jackharrhy/hikeping:main
    restart: unless-stopped
    env_file:
      - ./.runtime-secrets/hikeping.env

  adam_cooks:
    image: ghcr.io/jackharrhy/adam-cooks:main
    restart: unless-stopped
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.adam_cooks.loadbalancer.server.port=80"
      - "traefik.http.routers.adam_cooks.rule=Host(`adam-cooks.jackharrhy.dev`)"
      - "traefik.http.routers.adam_cooks.entrypoints=web"

  artbin:
    image: ghcr.io/jackharrhy/artbin:main
    restart: unless-stopped
    networks: [web]
    environment:
      - FOURM_URL=https://4orm.harrhy.xyz
      - FOURM_CLIENT_ID=artbin
      - ARTBIN_URL=https://artbin.jackharrhy.dev
    volumes:
      - /mnt/terrabud/docker-data/newport/artbin_data/data:/app/apps/web/data
      - /mnt/terrabud/docker-data/newport/artbin_data/uploads:/app/apps/web/public/uploads
      - /mnt/terrabud/docker-data/newport/artbin_data/tmp:/app/apps/web/tmp/uploads
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.artbin.loadbalancer.server.port=3000"
      - "traefik.http.routers.artbin.rule=Host(`artbin.jackharrhy.dev`)"
      - "traefik.http.routers.artbin.entrypoints=web"

  rotund_org:
    image: ghcr.io/jackharrhy/rotund.org:main
    restart: unless-stopped
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.rotund.loadbalancer.server.port=80"
      - "traefik.http.routers.rotund.rule=Host(`rotund.org`)"
      - "traefik.http.routers.rotund.entrypoints=web"

  stickertrade:
    image: ghcr.io/fogo-sh/stickertrade:latest
    restart: unless-stopped
    networks: [web]
    env_file:
      - ./.runtime-secrets/stickertrade.env
    volumes:
      - ./volumes/stickertrade_db:/app/db
      - ./volumes/stickertrade_uploads:/app/tmp/uploads
      - ./volumes/stickertrade_sessions:/app/tmp/sessions
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.stickertrade.loadbalancer.server.port=44100"
      - "traefik.http.routers.stickertrade.rule=Host(`stickertrade.ca`)"
      - "traefik.http.routers.stickertrade.entrypoints=web"

  sluggers_super_draft:
    image: ghcr.io/jackharrhy/sluggers-super-draft:main
    restart: unless-stopped
    networks: [web, sluggers_super_draft]
    env_file:
      - ./.runtime-secrets/sluggers_super_draft.env
    volumes:
      - ./volumes/sluggers_super_draft/images:/app/build/client/images
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.sluggers_super_draft.loadbalancer.server.port=3000"
      - "traefik.http.routers.sluggers_super_draft.rule=Host(`lil-slug-crew.jackharrhy.dev`)"
      - "traefik.http.routers.sluggers_super_draft.entrypoints=web"

  sluggers_super_draft_db:
    image: postgres:17
    restart: unless-stopped
    networks: [sluggers_super_draft]
    volumes:
      - ./volumes/sluggers_super_draft_db:/var/lib/postgresql/data
    env_file:
      - ./.runtime-secrets/sluggers_super_draft_db.env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  miniflux:
    image: ghcr.io/miniflux/miniflux:latest
    restart: unless-stopped
    depends_on: [miniflux_db]
    networks: [web, miniflux]
    env_file:
      - ./.runtime-secrets/miniflux.env
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.miniflux.loadbalancer.server.port=8080"
      - "traefik.http.routers.miniflux.rule=Host(`miniflux.jackharrhy.dev`)"
      - "traefik.http.routers.miniflux.entrypoints=web"

  miniflux_db:
    image: postgres:15
    restart: unless-stopped
    networks: [miniflux]
    volumes:
      - ./volumes/miniflux_db:/var/lib/postgresql/data
    env_file:
      - ./.runtime-secrets/miniflux_db.env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  cmd:
    image: ghcr.io/s0ftspark/cmd:latest
    restart: unless-stopped
    networks: [web, cmd_db]
    env_file:
      - ./.runtime-secrets/cmd.env
    environment:
      - PHX_HOST=cmd.softspark.dev
      - MIGRATE_ON_BOOT=1
      # Workspace containers (agent-in-sandbox + SSH access containers).
      # cmd commands the host daemon via the mounted socket; workspace
      # containers join newport_web so they can reach cmd's MCP endpoint
      # by service name.
      - WORKSPACE_IMAGE=ghcr.io/s0ftspark/cmd:workspace
      - WORKSPACE_DOCKER_NETWORK=newport_web
      - MCP_URL=http://cmd:4000/api/mcp
      - WORKSPACE_HOST_ROOT=/mnt/terrabud/docker-data/newport/cmd_data/workspaces
      - OPENCODE_DATA_HOST_DIR=/mnt/terrabud/docker-data/newport/cmd_data/opencode
      # SSH workspace gateway (BEAM-terminated; host key persists in /data).
      - SSH_GATEWAY_PORT=2222
      - SSH_HOST_KEY_DIR=/data/ssh_host_keys
      # Public DNS + router forward live as of 2026-06-12; pages
      # advertise ssh <workspace>@workspace.cmd.softspark.dev.
      - SSH_ADVERTISED_HOST=workspace.cmd.softspark.dev
    ports:
      - "2222:2222"
    volumes:
      - /mnt/terrabud/docker-data/newport/cmd_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.cmd.loadbalancer.server.port=4000"
      - "traefik.http.routers.cmd.rule=Host(`cmd.softspark.dev`)"
      - "traefik.http.routers.cmd.entrypoints=web"

  # cmd's Postgres + pgvector. Internal-only (cmd_db network, no published
  # ports); cmd reaches it at cmd_postgres:5432 (its DATABASE_URL). Data on
  # the big terrabud disk.
  cmd_postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    networks: [cmd_db]
    env_file:
      - ./.runtime-secrets/cmd_postgres.env
    volumes:
      - /mnt/terrabud/docker-data/newport/cmd_postgres:/var/lib/postgresql/data

  # Object storage (S3-compatible) for cmd: finance source documents + the
  # docs typst import surface (Cmd.ObjectStore.S3 → http://garage:3900).
  # Internal-only (cmd_db, no published ports). rpc_secret + admin_token come
  # from the env (cmd_garage.enc.yaml), not garage.toml. The bucket + access
  # key were bootstrapped via `docker exec ... /garage {layout,bucket,key}`
  # (the distroless image has no /bin/sh); OBJECT_STORE_* live in cmd.enc.yaml.
  cmd_garage:
    image: dxflrs/garage:v1.0.1
    restart: unless-stopped
    networks:
      cmd_db:
        aliases: [garage]
    env_file:
      - ./.runtime-secrets/cmd_garage.env
    volumes:
      - /mnt/terrabud/docker-data/newport/cmd_garage/meta:/var/lib/garage/meta
      - /mnt/terrabud/docker-data/newport/cmd_garage/data:/var/lib/garage/data
      - ./cmd_garage/garage.toml:/etc/garage.toml:ro

  bar:
    image: ghcr.io/jackharrhy/bar:main
    restart: unless-stopped
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.middlewares.bar-strip-prefix.stripprefix.prefixes=/bar"
      - "traefik.http.services.bar.loadbalancer.server.port=8080"
      - "traefik.http.routers.bar.rule=(Host(`jackharrhy.dev`) && PathPrefix(`/bar`))"
      - "traefik.http.routers.bar.middlewares=bar-strip-prefix@docker"
      - "traefik.http.routers.bar.entrypoints=web"

  duaas:
    image: ghcr.io/jackharrhy/duaas:main
    restart: unless-stopped
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.middlewares.duaas-strip-prefix.stripprefix.prefixes=/urandom"
      - "traefik.http.services.duaas.loadbalancer.server.port=8000"
      - "traefik.http.routers.duaas.rule=(Host(`jackharrhy.dev`) && PathPrefix(`/urandom`))"
      - "traefik.http.routers.duaas.middlewares=duaas-strip-prefix@docker"
      - "traefik.http.routers.duaas.entrypoints=web"

  phapbot:
    image: ghcr.io/jackharrhy/phapbot:latest
    restart: unless-stopped
    env_file:
      - ./.runtime-secrets/phapbot.env

  incydecy:
    image: ghcr.io/jackharrhy/incydecy:main
    restart: unless-stopped
    env_file:
      - ./.runtime-secrets/incydecy.env
    volumes:
      - ./volumes/incydecy:/app/data

  house:
    image: ghcr.io/jackharrhy/get-house-pls:main
    restart: unless-stopped
    # Chrome needs more than Docker's default 64MB /dev/shm
    shm_size: "2gb"
    env_file:
      - ./.runtime-secrets/house.env
    volumes:
      - ./volumes/house_data:/data

  almanac:
    image: ghcr.io/fogo-sh/almanac:latest
    restart: unless-stopped
    networks: [web]
    command: --content-dir /content --use-discord-oauth --use-bundled-assets
    volumes:
      - ./volumes/almanac_config:/config
      - ./volumes/almanac_content/content:/content
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.almanac.loadbalancer.server.port=8080"
      - "traefik.http.routers.almanac.rule=Host(`almanac.jackharrhy.dev`)"
      - "traefik.http.routers.almanac.entrypoints=web"

  marky:
    image: ghcr.io/jackharrhy/marky:main
    restart: unless-stopped
    networks: [web]
    env_file:
      - ./.runtime-secrets/marky.env
    environment:
      - MARKY_AUTH=discord
      - MARKY_BASE_URL=https://marky.jackharrhy.dev
      - MARKY_CONTENT_DIR=/repo/content
      - MARKY_GIT_REPO=/repo
      - MARKY_GIT_PUSH=true
    volumes:
      - ./volumes/almanac_content:/repo
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.marky.loadbalancer.server.port=44100"
      - "traefik.http.routers.marky.rule=Host(`marky.jackharrhy.dev`)"
      - "traefik.http.routers.marky.entrypoints=web"

  steve:
    image: ghcr.io/jackharrhy/letters-to-steve:latest
    restart: unless-stopped
    networks: [web]
    volumes:
      - ./volumes/steve:/code/data
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.steve.loadbalancer.server.port=5000"
      - "traefik.http.routers.steve.rule=Host(`steve-letter-writ.ing`)"
      - "traefik.http.routers.steve.entrypoints=web"

  notscared_site:
    image: ghcr.io/jackharrhy/notscared-site:main
    restart: unless-stopped
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.notscared_site.loadbalancer.server.port=4321"
      - "traefik.http.routers.notscared_site.rule=Host(`notsca.red`)"
      - "traefik.http.routers.notscared_site.entrypoints=web"

  rolie_polie_olie:
    image: ghcr.io/fogo-sh/rolie-polie-olie:main
    restart: unless-stopped
    networks: [web]
    env_file:
      - ./.runtime-secrets/rolie-polie-olie.env
    environment:
      - RPO_PUBLIC_URL=https://rolie-polie-olie.fogo.sh
      - RPO_DATABASE_PATH=/data/rolebot.sqlite
    volumes:
      - ./volumes/rolie_polie_olie:/data
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.rolie_polie_olie.loadbalancer.server.port=3000"
      - "traefik.http.routers.rolie_polie_olie.rule=Host(`rolie-polie-olie.fogo.sh`)"
      - "traefik.http.routers.rolie_polie_olie.entrypoints=web"

networks:
  web:
  miniflux:
  sluggers_super_draft:
  cmd_db:
    external: true
    name: newport_cmd_db
