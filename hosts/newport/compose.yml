services:
  traefik:
    image: traefik:v3
    restart: always
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--api.dashboard=true"
      - "--api.insecure=true"
    ports:
      - "80:80"
      - "127.0.0.1:18081:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
    networks:
      - web

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./.runtime-secrets/watchtower.env

  beszel-agent:
    image: ghcr.io/henrygd/beszel/beszel-agent:latest
    restart: always
    network_mode: host
    volumes:
      - ./volumes/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ./.runtime-secrets/beszel-agent.env

  qbrain:
    image: ghcr.io/jackharrhy/qbrain:main
    restart: unless-stopped
    networks: [web]
    env_file:
      - ./.runtime-secrets/qbrain.env
    volumes:
      - ./volumes/qbrain_data:/app/data
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.qbrain.loadbalancer.server.port=8099"
      - "traefik.http.routers.qbrain.rule=Host(`qbrain.jackharrhy.dev`)"
      - "traefik.http.routers.qbrain.entrypoints=web"

  4orm:
    image: ghcr.io/jackharrhy/4orm:main
    restart: unless-stopped
    networks: [web]
    env_file:
      - ./.runtime-secrets/4orm.env
    environment:
      - SITE_URL=https://4orm.harrhy.xyz
    volumes:
      - ./volumes/4orm_data:/app/data
      - ./volumes/4orm_uploads:/app/uploads
      - ./volumes/4orm_backups:/app/backups
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.4orm.loadbalancer.server.port=8000"
      - "traefik.http.routers.4orm.rule=Host(`4orm.harrhy.xyz`)"
      - "traefik.http.routers.4orm.entrypoints=web"

  hikeping:
    image: ghcr.io/jackharrhy/hikeping:main
    restart: unless-stopped
    env_file:
      - ./.runtime-secrets/hikeping.env

  adam_cooks:
    image: ghcr.io/jackharrhy/adam-cooks:main
    restart: unless-stopped
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.adam_cooks.loadbalancer.server.port=80"
      - "traefik.http.routers.adam_cooks.rule=Host(`adam-cooks.jackharrhy.dev`)"
      - "traefik.http.routers.adam_cooks.entrypoints=web"

  artbin:
    image: ghcr.io/jackharrhy/artbin:main
    restart: unless-stopped
    networks: [web]
    volumes:
      - ./volumes/artbin_data/artbin.db:/app/artbin.db
      - ./volumes/artbin_data/uploads:/app/public/uploads
      - ./volumes/artbin_data/tmp:/app/tmp/uploads
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.artbin.loadbalancer.server.port=3000"
      - "traefik.http.routers.artbin.rule=Host(`artbin.jackharrhy.dev`)"
      - "traefik.http.routers.artbin.entrypoints=web"

  rotund_org:
    image: ghcr.io/jackharrhy/rotund.org:main
    restart: always
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.rotund.loadbalancer.server.port=80"
      - "traefik.http.routers.rotund.rule=Host(`rotund.org`)"
      - "traefik.http.routers.rotund.entrypoints=web"

  stickertrade:
    image: ghcr.io/fogo-sh/stickertrade:latest
    restart: always
    networks: [web, stickertrade]
    volumes:
      - ./volumes/stickertrade:/app/data
    env_file:
      - ./.runtime-secrets/stickertrade.env
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.stickertrade.loadbalancer.server.port=3000"
      - "traefik.http.routers.stickertrade.rule=Host(`stickertrade.ca`)"
      - "traefik.http.routers.stickertrade.entrypoints=web"

  sluggers_super_draft:
    image: ghcr.io/jackharrhy/sluggers-super-draft:main
    restart: always
    networks: [web, sluggers_super_draft]
    env_file:
      - ./.runtime-secrets/sluggers_super_draft.env
    volumes:
      - ./volumes/sluggers_super_draft/images:/app/build/client/images
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.sluggers_super_draft.loadbalancer.server.port=3000"
      - "traefik.http.routers.sluggers_super_draft.rule=Host(`lil-slug-crew.jackharrhy.dev`)"
      - "traefik.http.routers.sluggers_super_draft.entrypoints=web"

  sluggers_super_draft_db:
    image: postgres:17
    restart: always
    networks: [sluggers_super_draft]
    volumes:
      - ./volumes/sluggers_super_draft_db:/var/lib/postgresql/data
    env_file:
      - ./.runtime-secrets/sluggers_super_draft_db.env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  miniflux:
    image: ghcr.io/miniflux/miniflux:latest
    restart: always
    depends_on: [miniflux_db]
    networks: [web, miniflux]
    env_file:
      - ./.runtime-secrets/miniflux.env
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.miniflux.loadbalancer.server.port=8080"
      - "traefik.http.routers.miniflux.rule=Host(`miniflux.jackharrhy.dev`)"
      - "traefik.http.routers.miniflux.entrypoints=web"

  miniflux_db:
    image: postgres:15
    restart: always
    networks: [miniflux]
    volumes:
      - ./volumes/miniflux_db:/var/lib/postgresql/data
    env_file:
      - ./.runtime-secrets/miniflux_db.env
    labels:
      - "com.centurylinklabs.watchtower.enable=false"

  bar:
    image: ghcr.io/jackharrhy/bar:main
    restart: always
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.middlewares.bar-strip-prefix.stripprefix.prefixes=/bar"
      - "traefik.http.services.bar.loadbalancer.server.port=8080"
      - "traefik.http.routers.bar.rule=(Host(`jackharrhy.dev`) && PathPrefix(`/bar`))"
      - "traefik.http.routers.bar.middlewares=bar-strip-prefix@docker"
      - "traefik.http.routers.bar.entrypoints=web"

  duaas:
    image: ghcr.io/jackharrhy/duaas:main
    restart: always
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.middlewares.duaas-strip-prefix.stripprefix.prefixes=/urandom"
      - "traefik.http.services.duaas.loadbalancer.server.port=8000"
      - "traefik.http.routers.duaas.rule=(Host(`jackharrhy.dev`) && PathPrefix(`/urandom`))"
      - "traefik.http.routers.duaas.middlewares=duaas-strip-prefix@docker"
      - "traefik.http.routers.duaas.entrypoints=web"

  phapbot:
    image: ghcr.io/jackharrhy/phapbot:latest
    restart: always
    env_file:
      - ./.runtime-secrets/phapbot.env

  incydecy:
    image: ghcr.io/jackharrhy/incydecy:main
    restart: always
    env_file:
      - ./.runtime-secrets/incydecy.env
    volumes:
      - ./volumes/incydecy:/app/data

  house:
    image: ghcr.io/jackharrhy/get-house-pls:main
    restart: unless-stopped
    # Chrome needs more than Docker's default 64MB /dev/shm
    shm_size: "2gb"
    env_file:
      - ./.runtime-secrets/house.env
    volumes:
      - ./volumes/house_data:/data

  ileah:
    image: ghcr.io/jackharrhy/ileah:main
    restart: always
    env_file:
      - ./.runtime-secrets/ileah.env

  almanac:
    image: ghcr.io/fogo-sh/almanac:latest
    restart: always
    networks: [web]
    command: --content-dir /content --use-discord-oauth --use-bundled-assets
    volumes:
      - ./volumes/almanac_config:/config
      - ./volumes/almanac_content/content:/content
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.almanac.loadbalancer.server.port=8080"
      - "traefik.http.routers.almanac.rule=Host(`almanac.jackharrhy.dev`)"
      - "traefik.http.routers.almanac.entrypoints=web"

  steve:
    image: ghcr.io/jackharrhy/letters-to-steve:latest
    restart: always
    networks: [web]
    volumes:
      - ./volumes/steve:/code/data
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.steve.loadbalancer.server.port=5000"
      - "traefik.http.routers.steve.rule=Host(`steve-letter-writ.ing`)"
      - "traefik.http.routers.steve.entrypoints=web"

  notscared_site:
    image: ghcr.io/jackharrhy/notscared-site:main
    restart: always
    networks: [web]
    labels:
      - "traefik.docker.network=newport_web"
      - "traefik.enable=true"
      - "traefik.http.services.notscared_site.loadbalancer.server.port=4321"
      - "traefik.http.routers.notscared_site.rule=Host(`notsca.red`)"
      - "traefik.http.routers.notscared_site.entrypoints=web"

  #terranova:
