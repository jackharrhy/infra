sources:
  docker:
    type: docker_logs
    auto_partial_merge: true

transforms:
  enrich:
    type: remap
    inputs: [docker]
    source: |
      .host = "newport"
      .compose_project = get(.label, ["com.docker.compose.project"]) ?? "unknown"
      .compose_service = get(.label, ["com.docker.compose.service"]) ?? .container_name

sinks:
  victorialogs:
    type: http
    inputs: [enrich]
    uri: "http://100.124.6.111:9428/insert/jsonline?_stream_fields=host,compose_project,compose_service,container_name,stream&_msg_field=message&_time_field=timestamp"
    compression: gzip
    encoding:
      codec: json
    framing:
      method: newline_delimited
    healthcheck:
      enabled: false
