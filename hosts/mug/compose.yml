services:
  traefik:
    image: traefik:v3
    restart: always
    networks: [web]
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.file.directory=/etc/traefik/dynamic"
      - "--providers.file.watch=true"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # DNS-01 resolver — used for all domains hosted on DigitalOcean DNS,
      # which is also where wildcards live (e.g. *.jackharrhy.dev).
      - "--certificatesresolvers.mugresolver.acme.email=me@jackharrhy.com"
      - "--certificatesresolvers.mugresolver.acme.dnschallenge=true"
      - "--certificatesresolvers.mugresolver.acme.dnschallenge.provider=digitalocean"
      - "--certificatesresolvers.mugresolver.acme.storage=/letsencrypt/acme.json"
      # HTTP-01 resolver — for domains hosted on a DNS provider Traefik can't
      # talk to (e.g. fogo.sh is on Cloudflare). Let's Encrypt fetches
      # http://<host>/.well-known/acme-challenge/<token> directly; Traefik's
      # ACME-bypass router serves the token regardless of the http→https
      # redirect because its path rule outranks the host catchall.
      - "--certificatesresolvers.mughttp.acme.email=me@jackharrhy.com"
      - "--certificatesresolvers.mughttp.acme.httpchallenge=true"
      - "--certificatesresolvers.mughttp.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.mughttp.acme.storage=/letsencrypt/acme-http.json"
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"
    env_file:
      - ./.runtime-secrets/traefik.env
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./traefik/dynamic:/etc/traefik/dynamic:ro
      - ./volumes/traefik_letsencrypt_data:/letsencrypt
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
      - "traefik.enable=true"
      # HTTP -> HTTPS redirect. The rule has to use v3 matcher syntax —
      # the old `hostregexp({host:.+})` worked in v2 but is a no-op under
      # the v3 router engine, which is why this catchall was silently
      # 404-ing every plain-http request. The ACME-bypass router for
      # HTTP-01 challenges has a longer path-prefix rule and so outranks
      # this one on rule-length priority, so renewals still work.
      - "traefik.http.routers.http-catchall.rule=HostRegexp(`.+`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https@docker"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

  easter_egg:
    image: nginx:alpine
    restart: always
    networks: [web]
    volumes:
      - ./easter-egg:/usr/share/nginx/html:ro
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.easter-egg.loadbalancer.server.port=80"
      # Match requests hitting the droplet's raw IP (v4 or v6). Higher
      # priority than the http-catchall redirect so these don't bounce to
      # https (there is no LE cert for a bare IP).
      - "traefik.http.routers.easter-egg.rule=Host(`142.93.144.29`) || Host(`2604:a880:cad:d0::dff:a001`)"
      - "traefik.http.routers.easter-egg.entrypoints=web"
      - "traefik.http.routers.easter-egg.priority=1000"

  watchtower:
    image: ghcr.io/nicholas-fedor/watchtower:latest
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./.runtime-secrets/watchtower.env

  beszel:
    image: ghcr.io/henrygd/beszel/beszel:latest
    restart: always
    networks: [web]
    volumes:
      - ./volumes/beszel_data:/beszel_data
      - ./volumes/beszel_socket:/beszel_socket
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.beszel.loadbalancer.server.port=8090"
      - "traefik.http.routers.beszel.rule=Host(`beszel.jackharrhy.dev`)"
      - "traefik.http.routers.beszel.entrypoints=websecure"
      - "traefik.http.routers.beszel.tls.certresolver=mugresolver"

  beszel-agent:
    image: ghcr.io/henrygd/beszel/beszel-agent:latest
    restart: always
    network_mode: host
    volumes:
      - ./volumes/beszel_socket:/beszel_socket
      - /var/run/docker.sock:/var/run/docker.sock:ro
    env_file:
      - ./.runtime-secrets/beszel-agent.env

  jackharrhy:
    image: ghcr.io/jackharrhy/jackharrhy.com:main
    restart: always
    networks: [web]
    env_file:
      - ./.runtime-secrets/jackharrhy.env
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.jackharrhy.loadbalancer.server.port=80"
      - "traefik.http.routers.jackharrhy.rule=(Host(`jackharrhy.dev`) || Host(`jackharrhy.com`) || Host(`harrhy.xyz`) || Host(`jack.harrhy.xyz`) || Host(`jack.arthur.harrhy.xyz`) || Host(`jack.is.harrhy.xyz`))"
      - "traefik.http.routers.jackharrhy.priority=1"
      - "traefik.http.routers.jackharrhy.entrypoints=websecure"
      - "traefik.http.routers.jackharrhy.tls.certresolver=mugresolver"
      - "traefik.http.routers.jackharrhy.tls.domains[0].main=jackharrhy.dev"
      - "traefik.http.routers.jackharrhy.tls.domains[0].sans=*.jackharrhy.dev"
      - "traefik.http.routers.jackharrhy.tls.domains[1].main=harrhy.xyz"
      - "traefik.http.routers.jackharrhy.tls.domains[1].sans=*.harrhy.xyz"
      - "traefik.http.routers.jackharrhy.tls.domains[2].main=jackharrhy.com"
      - "traefik.http.routers.jackharrhy.tls.domains[2].sans=*.jackharrhy.com"

  siliconharbour:
    image: ghcr.io/siliconharbour/siliconharbour.dev:main
    restart: always
    networks: [web]
    env_file:
      - ./.runtime-secrets/siliconharbour.env
    volumes:
      - ./volumes/siliconharbour:/app/data
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.siliconharbour.loadbalancer.server.port=3000"
      - "traefik.http.routers.siliconharbour.rule=Host(`siliconharbour.dev`)"
      - "traefik.http.routers.siliconharbour.entrypoints=websecure"
      - "traefik.http.routers.siliconharbour.tls.certresolver=mugresolver"
      - "com.centurylinklabs.watchtower.enable=false"

  plow:
    image: ghcr.io/jackharrhy/where-the-plow:main
    restart: always
    networks: [web]
    volumes:
      - ./volumes/plow:/data
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.plow.loadbalancer.server.port=8000"
      - "traefik.http.routers.plow.rule=Host(`plow.jackharrhy.dev`)"
      - "traefik.http.routers.plow.entrypoints=websecure"
      - "traefik.http.routers.plow.tls.certresolver=mugresolver"

  burger:
    image: ghcr.io/jackharrhy/burger:main
    restart: always
    networks: [web]
    environment:
      - NODE_ENV=production
      - DB_PATH=/app/data/burger.db
      - FOURM_URL=https://4orm.harrhy.xyz
      - FOURM_CLIENT_ID=burger
      - BURGER_URL=https://big.burger.beauty
    volumes:
      - ./volumes/burger_data:/app/data
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.burger.loadbalancer.server.port=5000"
      - "traefik.http.routers.burger.rule=Host(`big.burger.beauty`)"
      - "traefik.http.routers.burger.entrypoints=websecure"
      - "traefik.http.routers.burger.tls.certresolver=mugresolver"
      - "traefik.http.routers.burger.tls.domains[0].main=burger.beauty"
      - "traefik.http.routers.burger.tls.domains[0].sans=*.burger.beauty"

  andrewsite_astro:
    image: ghcr.io/jackharrhy/andrew-gosse-site-astro:main
    restart: always
    networks: [web, andrewsite]
    environment:
      - STRAPI_URL=http://andrewsite_strapi:1337
      - EXTERNAL_STRAPI_URL=https://api.andrewgossecomposer.com
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.andrewsiteastro.loadbalancer.server.port=4321"
      - "traefik.http.routers.andrewsiteastro.rule=Host(`andrewgossecomposer.com`)"
      - "traefik.http.routers.andrewsiteastro.entrypoints=websecure"
      - "traefik.http.routers.andrewsiteastro.tls.certresolver=mugresolver"
      - "traefik.http.routers.andrewsiteastro.tls.domains[0].main=andrewgossecomposer.com"
      - "traefik.http.routers.andrewsiteastro.tls.domains[0].sans=*.andrewgossecomposer.com"

  andrewsite_strapi:
    image: ghcr.io/jackharrhy/andrew-gosse-site-strapi:main
    restart: always
    networks: [web, andrewsite]
    env_file:
      - ./.runtime-secrets/andrewsite_strapi.env
    environment:
      - DATABASE_FILENAME=./data/data.db
    volumes:
      - ./volumes/andrewsite_strapi_data:/opt/app/data
      - ./volumes/andrewsite_strapi_uploads:/opt/app/public/uploads
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.andrewsitestrapi.loadbalancer.server.port=1337"
      - "traefik.http.routers.andrewsitestrapi.rule=Host(`api.andrewgossecomposer.com`)"
      - "traefik.http.routers.andrewsitestrapi.entrypoints=websecure"
      - "traefik.http.routers.andrewsitestrapi.tls.certresolver=mugresolver"

  stackcoin:
    image: ghcr.io/stackcoin/stackcoin:main
    restart: always
    env_file:
      - ./.runtime-secrets/stackcoin.env
    volumes:
      - ./volumes/stackcoin:/data
    networks: [web]
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.stackcoin.loadbalancer.server.port=80"
      - "traefik.http.routers.stackcoin.rule=Host(`stackcoin.world`)"
      - "traefik.http.routers.stackcoin.entrypoints=websecure"
      - "traefik.http.routers.stackcoin.tls.certresolver=mugresolver"

  luckypot:
    image: ghcr.io/stackcoin/luckypot:main
    restart: always
    networks: [web]
    env_file:
      - ./.runtime-secrets/luckypot.env
    environment:
      - LUCKYPOT_DB_PATH=/app/data/luckypot.db
    volumes:
      - ./volumes/luckypot:/app/data

  lists:
    image: ghcr.io/jackharrhy/lists:main
    restart: always
    networks: [web]
    env_file:
      - ./.runtime-secrets/lists.env
    volumes:
      - ./volumes/lists_data:/data
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.lists.loadbalancer.server.port=8080"
      - "traefik.http.routers.lists.rule=Host(`lists.jackharrhy.dev`)"
      - "traefik.http.routers.lists.entrypoints=websecure"
      - "traefik.http.routers.lists.tls.certresolver=mugresolver"

  zonia:
    image: ghcr.io/jackharrhy/zonia:main
    restart: always
    networks: [web]
    env_file:
      - ./.runtime-secrets/zonia.env
    environment:
      - PHX_HOST=zonia.harrhy.xyz
      - ZONIA_DATABASE=/data/zonia.db
      - PORT=4000
    volumes:
      - ./volumes/zonia:/data
    labels:
      - "traefik.docker.network=mug_web"
      - "traefik.enable=true"
      - "traefik.http.services.zonia.loadbalancer.server.port=4000"
      - "traefik.http.routers.zonia.rule=Host(`zonia.harrhy.xyz`)"
      - "traefik.http.routers.zonia.entrypoints=websecure"
      - "traefik.http.routers.zonia.tls.certresolver=mugresolver"

networks:
  andrewsite:
  web:
