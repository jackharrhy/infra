http:
  routers:
    miniflux-via-newport:
      rule: "Host(`miniflux.jackharrhy.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    stickertrade-via-newport:
      rule: "Host(`stickertrade.ca`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    sluggers-via-newport:
      rule: "Host(`lil-slug-crew.jackharrhy.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    rotund-via-newport:
      rule: "Host(`rotund.org`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    bar-via-newport:
      rule: "Host(`jackharrhy.dev`) && PathPrefix(`/bar`)"
      priority: 100
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    duaas-via-newport:
      rule: "Host(`jackharrhy.dev`) && PathPrefix(`/urandom`)"
      priority: 100
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    almanac-via-newport:
      rule: "Host(`almanac.jackharrhy.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    steve-via-newport:
      rule: "Host(`steve-letter-writ.ing`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    notscared-via-newport:
      rule: "Host(`notsca.red`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    qbrain-via-newport:
      rule: "Host(`qbrain.jackharrhy.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    4orm-via-newport:
      rule: "Host(`4orm.harrhy.xyz`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    adam-eats-via-newport:
      rule: "Host(`adam-eats.jackharrhy.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    artbin-via-newport:
      rule: "Host(`artbin.jackharrhy.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    marky-via-newport:
      rule: "Host(`marky.jackharrhy.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        certResolver: mugresolver

    rolie-polie-olie-via-newport:
      rule: "Host(`rolie-polie-olie.fogo.sh`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        # fogo.sh is on Cloudflare, not DigitalOcean, use HTTP-01 instead.
        certResolver: mughttp

    cmd-via-newport:
      rule: "Host(`cmd.softspark.dev`)"
      entryPoints: [websecure]
      service: newport-origin
      tls:
        # softspark.dev is on Cloudflare, not DigitalOcean, use HTTP-01 instead.
        certResolver: mughttp

  services:
    newport-origin:
      loadBalancer:
        passHostHeader: true
        servers:
          - url: "http://newport.hedgehog-python.ts.net:80"
